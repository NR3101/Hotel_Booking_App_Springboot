spring:
  application:
    name: HotelBookingApp
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/hotel_booking_db}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true
